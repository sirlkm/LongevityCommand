<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cardiac Risk Prediction</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .risk-low    { color: #16a34a; }
    .risk-moderate { color: #d97706; }
    .risk-high   { color: #dc2626; }
    .bg-risk-low    { background-color: #16a34a; }
    .bg-risk-moderate { background-color: #d97706; }
    .bg-risk-high   { background-color: #dc2626; }
    .ring-risk-low    { box-shadow: 0 0 0 4px rgba(22,163,74,0.2); }
    .ring-risk-moderate { box-shadow: 0 0 0 4px rgba(217,119,6,0.2); }
    .ring-risk-high   { box-shadow: 0 0 0 4px rgba(220,38,38,0.2); }
    input[type=range] { -webkit-appearance: none; height: 6px; border-radius: 3px; background: #cbd5e1; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #3b82f6; cursor: pointer; }
    #results { transition: opacity 0.3s ease; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center gap-3">
      <div class="w-10 h-10 bg-red-500 rounded-lg flex items-center justify-center">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-xl font-bold text-gray-900">Cardiac Risk Engine</h1>
        <p class="text-sm text-gray-500">6-Month Cardiac Event Prediction</p>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8">
    <div class="grid lg:grid-cols-5 gap-8">

      <!-- Left: Input Form -->
      <div class="lg:col-span-2">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
          <h2 class="text-lg font-semibold text-gray-900 mb-1">Patient Metrics</h2>
          <p class="text-sm text-gray-500 mb-5">Enter biometric and lifestyle data</p>

          <form id="patientForm" class="space-y-4">
            <div>
              <label class="flex justify-between text-sm font-medium text-gray-700 mb-1">
                <span>Age</span><span id="age_val" class="text-gray-400">45</span>
              </label>
              <input type="range" id="age" min="30" max="60" value="45" step="1" class="w-full">
            </div>
            <div>
              <label class="flex justify-between text-sm font-medium text-gray-700 mb-1">
                <span>BMI</span><span id="bmi_val" class="text-gray-400">27</span>
              </label>
              <input type="range" id="bmi" min="20" max="38" value="27" step="0.5" class="w-full">
            </div>
            <div>
              <label class="flex justify-between text-sm font-medium text-gray-700 mb-1">
                <span>Resting HR (bpm)</span><span id="resting_hr_val" class="text-gray-400">72</span>
              </label>
              <input type="range" id="resting_hr" min="50" max="95" value="72" step="1" class="w-full">
            </div>
            <div>
              <label class="flex justify-between text-sm font-medium text-gray-700 mb-1">
                <span>HRV RMSSD (ms)</span><span id="hrv_rmssd_val" class="text-gray-400">55</span>
              </label>
              <input type="range" id="hrv_rmssd" min="20" max="90" value="55" step="1" class="w-full">
            </div>
            <div>
              <label class="flex justify-between text-sm font-medium text-gray-700 mb-1">
                <span>Sleep (hours)</span><span id="sleep_hours_val" class="text-gray-400">7.0</span>
              </label>
              <input type="range" id="sleep_hours" min="4" max="9" value="7" step="0.5" class="w-full">
            </div>
            <div>
              <label class="flex justify-between text-sm font-medium text-gray-700 mb-1">
                <span>Stress Score</span><span id="stress_score_val" class="text-gray-400">5</span>
              </label>
              <input type="range" id="stress_score" min="1" max="10" value="5" step="1" class="w-full">
            </div>
            <div>
              <label class="flex justify-between text-sm font-medium text-gray-700 mb-1">
                <span>Recovery (hours)</span><span id="recovery_hours_val" class="text-gray-400">28</span>
              </label>
              <input type="range" id="recovery_hours" min="12" max="48" value="28" step="1" class="w-full">
            </div>

            <button type="submit" id="analyzeBtn"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors mt-2">
              Analyze Risk
            </button>
          </form>

          <!-- Demo patient buttons -->
          <div class="mt-5 pt-5 border-t border-gray-100">
            <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-3">Load Example Patient</p>
            <div class="flex flex-col gap-2" id="demoButtons"></div>
          </div>
        </div>
      </div>

      <!-- Right: Results -->
      <div class="lg:col-span-3">
        <div id="placeholder" class="bg-white rounded-xl shadow-sm border border-gray-200 p-12 text-center">
          <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
          </div>
          <p class="text-gray-500 font-medium">Enter patient data and click Analyze Risk</p>
          <p class="text-gray-400 text-sm mt-1">or load a demo patient to get started</p>
        </div>

        <div id="results" class="hidden space-y-5">
          <!-- Risk Score Card -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <div class="flex items-center gap-6">
              <div id="scoreCircle" class="w-28 h-28 rounded-full flex flex-col items-center justify-center flex-shrink-0 border-4">
                <span id="scoreNum" class="text-4xl font-bold">—</span>
                <span class="text-xs font-medium opacity-70">/ 100</span>
              </div>
              <div>
                <span id="riskBadge" class="inline-block px-3 py-1 rounded-full text-sm font-bold text-white mb-2">—</span>
                <p id="recommendation" class="text-gray-600 text-sm leading-relaxed"></p>
              </div>
            </div>
          </div>

          <!-- Timeline Chart -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <h3 class="text-sm font-semibold text-gray-900 mb-4">6-Month Risk Timeline</h3>
            <div style="height: 220px;">
              <canvas id="timelineChart"></canvas>
            </div>
          </div>

          <!-- Risk Factors -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <h3 class="text-sm font-semibold text-gray-900 mb-3">Top Risk Factors</h3>
            <ul id="factorsList" class="space-y-2"></ul>
          </div>
        </div>
      </div>
    </div>
  </main>

<script>
const FIELDS = ['age','bmi','resting_hr','hrv_rmssd','sleep_hours','stress_score','recovery_hours'];
let timelineChart = null;

// Wire up slider live-value display
FIELDS.forEach(f => {
  const el = document.getElementById(f);
  const valEl = document.getElementById(f + '_val');
  el.addEventListener('input', () => { valEl.textContent = el.value; });
});

// Load demo patients
fetch('/demo-patients').then(r => r.json()).then(patients => {
  const container = document.getElementById('demoButtons');
  const colors = ['green','yellow','red'];
  const rings = ['ring-2 ring-green-200','ring-2 ring-yellow-200','ring-2 ring-red-200'];
  const dots = ['bg-green-500','bg-yellow-500','bg-red-500'];
  patients.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = `flex items-center gap-2 w-full text-left px-3 py-2 text-sm rounded-lg border border-gray-200 hover:bg-gray-50 transition-colors`;
    btn.innerHTML = `<span class="w-2.5 h-2.5 rounded-full ${dots[i]} flex-shrink-0"></span>${p.label}`;
    btn.onclick = () => loadDemo(p.data);
    container.appendChild(btn);
  });
});

function loadDemo(data) {
  FIELDS.forEach(f => {
    const el = document.getElementById(f);
    el.value = data[f];
    document.getElementById(f + '_val').textContent = data[f];
  });
  document.getElementById('patientForm').dispatchEvent(new Event('submit'));
}

// Form submit
document.getElementById('patientForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('analyzeBtn');
  btn.textContent = 'Analyzing...';
  btn.disabled = true;

  const payload = {};
  FIELDS.forEach(f => {
    payload[f] = f === 'stress_score' ? parseInt(document.getElementById(f).value)
                                      : parseFloat(document.getElementById(f).value);
  });

  try {
    const resp = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    renderResults(data);
  } catch (err) {
    alert('Prediction failed: ' + err.message);
  } finally {
    btn.textContent = 'Analyze Risk';
    btn.disabled = false;
  }
});

function renderResults(data) {
  document.getElementById('placeholder').classList.add('hidden');
  document.getElementById('results').classList.remove('hidden');

  const level = data.risk_level.toLowerCase();  // low, moderate, high
  const colorClass = 'risk-' + level;
  const bgClass = 'bg-risk-' + level;
  const ringClass = 'ring-risk-' + level;

  // Score circle
  const circle = document.getElementById('scoreCircle');
  circle.className = `w-28 h-28 rounded-full flex flex-col items-center justify-center flex-shrink-0 border-4 ${ringClass}`;
  const scoreNum = document.getElementById('scoreNum');
  scoreNum.textContent = data.risk_score;
  scoreNum.className = `text-4xl font-bold ${colorClass}`;

  // Badge
  const badge = document.getElementById('riskBadge');
  badge.textContent = data.risk_level;
  badge.className = `inline-block px-3 py-1 rounded-full text-sm font-bold text-white mb-2 ${bgClass}`;

  // Recommendation
  document.getElementById('recommendation').textContent = data.recommendation;

  // Risk factors
  const ul = document.getElementById('factorsList');
  ul.innerHTML = '';
  data.top_risk_factors.forEach(f => {
    const li = document.createElement('li');
    li.className = 'flex items-start gap-2 text-sm text-gray-700';
    const isGood = f.includes('No major');
    li.innerHTML = `<span class="mt-0.5 w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0 ${isGood ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
      ${isGood ? '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>'
               : '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 9v2m0 4h.01"/></svg>'}
    </span>${f}`;
    ul.appendChild(li);
  });

  // Timeline chart
  renderTimeline(data.timeline, level);
}

function renderTimeline(timeline, level) {
  const ctx = document.getElementById('timelineChart').getContext('2d');
  const colorMap = { low: '#16a34a', moderate: '#d97706', high: '#dc2626' };
  const bgMap   = { low: 'rgba(22,163,74,0.1)', moderate: 'rgba(217,119,6,0.1)', high: 'rgba(220,38,38,0.1)' };
  const color = colorMap[level];

  if (timelineChart) timelineChart.destroy();
  timelineChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Month 1','Month 2','Month 3','Month 4','Month 5','Month 6'],
      datasets: [{
        label: 'Risk %',
        data: timeline.map(v => +(v * 100).toFixed(1)),
        borderColor: color,
        backgroundColor: bgMap[level],
        fill: true,
        tension: 0.3,
        pointRadius: 5,
        pointBackgroundColor: color,
        borderWidth: 2.5,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ctx.parsed.y.toFixed(1) + '%' } }
      },
      scales: {
        y: {
          min: 0,
          max: 100,
          ticks: { callback: v => v + '%', font: { size: 11 } },
          grid: { color: '#f1f5f9' },
        },
        x: {
          ticks: { font: { size: 11 } },
          grid: { display: false },
        }
      }
    }
  });
}
</script>
</body>
</html>
